appId: host.exp.Exponent
---
- openLink: ${MAESTRO_EXPO_URL}
- runFlow:
    when:
      visible: Open
    commands:
      - tapOn: Open
- extendedWaitUntil:
    visible:
      id: explore-screen
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: search-pill
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: category-cabins
    timeout: 30000
- takeScreenshot: maestro-liquid-explore

- tapOn:
    text: Wishlists
- extendedWaitUntil:
    visible:
      id: wishlists-screen
    timeout: 30000
- tapOn:
    text: Trips
- extendedWaitUntil:
    visible:
      id: trips-screen
    timeout: 30000
- tapOn:
    text: Inbox
- extendedWaitUntil:
    visible:
      id: inbox-screen
    timeout: 30000
- tapOn:
    text: Profile
- extendedWaitUntil:
    visible:
      id: profile-screen
    timeout: 30000
- tapOn:
    text: Explore
- extendedWaitUntil:
    visible:
      id: explore-screen
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: category-cabins
    timeout: 30000
- takeScreenshot: maestro-liquid-tabs

- tapOn:
    id: category-cabins
- extendedWaitUntil:
    visible:
      id: property-card-p2
    timeout: 30000
- assertVisible: Aspen, Colorado
- assertVisible: A-frame retreat in pine forest
- takeScreenshot: maestro-liquid-cabins

- tapOn:
    text: A-frame retreat in pine forest
- extendedWaitUntil:
    visible:
      id: reserve-btn
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: detail-heart
    timeout: 30000
- takeScreenshot: maestro-liquid-detail

- tapOn:
    id: reserve-btn
- extendedWaitUntil:
    visible:
      id: booking-screen
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: nights-plus
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: guests-plus
    timeout: 30000
- takeScreenshot: maestro-liquid-booking

- tapOn:
    id: nights-plus
- tapOn:
    id: guests-plus
- assertVisible: Visa · ending 4242
- takeScreenshot: maestro-liquid-payment
