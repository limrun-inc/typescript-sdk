appId: host.exp.Exponent
---
- openLink: ${MAESTRO_EXPO_URL}
- runFlow:
    when:
      visible: 'Open in "Expo Go"'
    commands:
      - tapOn: Open
- extendedWaitUntil:
    visible: Limrun Detox Demo
    timeout: 90000
- takeScreenshot: limrun-maestro-home

- tapOn:
    id: demo-increment-button
- tapOn:
    id: demo-increment-button
- tapOn:
    id: demo-decrement-button
- assertVisible: "1"
- takeScreenshot: limrun-maestro-counter

- tapOn:
    id: demo-name-input
- inputText: Limrun
- tapOn:
    text: done
- assertVisible: Hello, Limrun!
- takeScreenshot: limrun-maestro-greeting

- tapOn:
    id: demo-open-detail-button
- assertVisible: Remote simulator actions
- tapOn:
    id: demo-automation-switch
- tapOn:
    id: demo-complete-task-button
- assertVisible: "Success: Limrun Detox completed the demo flow."
- takeScreenshot: limrun-maestro-success
