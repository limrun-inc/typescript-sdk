<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RemoteControl Demo - @limrun/ui</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      #root {
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 1400px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        color: white;
        padding: 20px;
      }

      .header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      }

      .header p {
        font-size: 1.1rem;
        opacity: 0.9;
      }

      .demo-container {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 30px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .control-group label {
        font-weight: 600;
        font-size: 0.9rem;
        color: #374151;
      }

      .control-group input,
      .control-group select {
        padding: 10px 15px;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        font-size: 0.95rem;
        transition: border-color 0.2s;
      }

      .control-group input:focus,
      .control-group select:focus {
        outline: none;
        border-color: #667eea;
      }

      .button-group {
        display: flex;
        gap: 10px;
      }

      button {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      button.primary {
        background: #667eea;
        color: white;
      }

      button.primary:hover {
        background: #5568d3;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      button.secondary {
        background: #e5e7eb;
        color: #374151;
      }

      button.secondary:hover {
        background: #d1d5db;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .device-preview {
        display: flex;
        gap: 30px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .preview-item {
        flex: 1 1 420px;
        max-width: 520px;
        height: min(75vh, 900px);
      }

      .preview-item h3 {
        text-align: center;
        margin-bottom: 15px;
        font-size: 1.2rem;
        color: #374151;
      }

      .device-wrapper {
        height: 100%;
        width: 100%;
        background: #f9fafb;
        border-radius: 12px;
        overflow: hidden;
      }

      @media (max-width: 640px) {
        body {
          padding: 12px;
        }

        .demo-container {
          padding: 16px;
        }

        .button-group {
          flex-direction: column;
        }

        .preview-item {
          max-width: 100%;
          height: 70vh;
        }
      }

      .info-box {
        background: #fef3c7;
        border: 2px solid #fbbf24;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
      }

      .info-box h4 {
        color: #92400e;
        margin-bottom: 8px;
        font-size: 0.95rem;
      }

      .info-box p {
        color: #78350f;
        font-size: 0.9rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/demo.tsx"></script>
  </body>
</html>
